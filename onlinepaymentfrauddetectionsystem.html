<!DOCTYPE html>
<html>
<head>
<title>User Authentication System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* 🔥 Beautiful Gradient */
    background: linear-gradient(135deg, #e0eafc, #cfdef3);
}

/* Card Design */
.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;

    background: linear-gradient(45deg, #4facfe, #00f2fe);
    cursor: pointer;
}

/* Hover effect 🔥 */
button:hover {
    opacity: 0.9;
    transform: scale(1.03);
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">

<h2>User Authentication</h2>

<!-- REGISTER -->
<div id="registerDiv">
<h3>Register</h3>
<input type="text" id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>
<p id="regMsg"></p>
</div>

<!-- LOGIN -->
<div id="loginDiv">
<h3>Login</h3>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<!-- TRANSACTION -->
<div id="transactionDiv" class="hidden">
<h3>Welcome <span id="user"></span> 🎉</h3>

<input type="number" id="amount" placeholder="Enter amount">

<button onclick="pay()">Pay</button>

<p id="payMsg"></p>

<button onclick="logout()">Logout</button>
</div>

</div>

<script>

// REGISTER
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    document.getElementById("regMsg").innerHTML = "✔ Registration Successful";
}

// LOGIN
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let storedUser = localStorage.getItem("username");
    let storedPass = localStorage.getItem("password");

    if (user === storedUser && pass === storedPass) {

        // Hide register & login
        document.getElementById("registerDiv").style.display = "none";
        document.getElementById("loginDiv").style.display = "none";

        // Show transaction
        document.getElementById("transactionDiv").style.display = "block";

        document.getElementById("user").innerText = user;

        document.getElementById("loginMsg").innerHTML = "";
    } 
    else {
        document.getElementById("loginMsg").innerHTML = "❌ Invalid Credentials";
        document.getElementById("loginMsg").style.color = "red";
    }
}

// PAYMENT + FRAUD DETECTION
function pay() {
    let amount = document.getElementById("amount").value;

    if (amount > 50000) {
        document.getElementById("payMsg").innerHTML = "⚠ Fraud Detected!";
        document.getElementById("payMsg").style.color = "red";
    } 
    else if (amount > 10000) {
        document.getElementById("payMsg").innerHTML = "⚠ Large Transaction - OTP Required";
        document.getElementById("payMsg").style.color = "orange";
    } 
    else {
        document.getElementById("payMsg").innerHTML = "✔ Transaction Successful";
        document.getElementById("payMsg").style.color = "green";
    }
}

// LOGOUT
function logout() {
    location.reload();
}

</script>

</body>
</html>
